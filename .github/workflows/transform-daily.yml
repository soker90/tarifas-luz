name: Transform Excel to JSON

on:
  schedule:
    - cron: '0 0 * * *'  # Medianoche UTC diariamente
  workflow_dispatch:      # Permitir ejecución manual

jobs:
  transform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      
      - uses: pnpm/action-setup@v2
        with:
          version: latest
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Transform Excel
        env:
          EXCEL_URL: ${{ vars.EXCEL_URL }}
        run: pnpm transform:download
      
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tarifas.json
          git diff --staged --quiet || (git commit -m "chore: update tarifas.json - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push origin master)
